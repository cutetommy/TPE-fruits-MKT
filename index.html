<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台北果菜市場行情</title>
  <style>
    body { font-family: system-ui; padding: 20px; background: #f5f5f5; }
    h1 { color: #2c5f2d; }
    table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #2c5f2d; color: white; }
    tr:nth-child(even) { background: #f9f9f9; }
    #loading { color: #666; }
    select { padding: 6px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <h1>台北果菜市場行情</h1>
  <select id="days" onchange="loadData()">
    <option value="1">今日</option>
    <option value="7">近7天</option>
    <option value="30">近30天</option>
    <option value="180">近半年</option>
  </select>
  
  <div id="loading">載入中...</div>
  <table id="table" style="display:none">
    <thead>
      <tr>
        <th>日期</th>
        <th>市場</th>
        <th>品項</th>
        <th>上價</th>
        <th>中價</th>
        <th>下價</th>
        <th>均價</th>
        <th>交易量</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>
    async function loadData() {
      const days = document.getElementById('days').value;
      const loading = document.getElementById('loading');
      const table = document.getElementById('table');
      const tbody = document.getElementById('tbody');
      
      loading.style.display = 'block';
      table.style.display = 'none';
      tbody.innerHTML = '';
      
      try {
        const res = await fetch(`/api/fruit?days=${days}`);
        const data = await res.json();
        
        if (!Array.isArray(data)) throw new Error('API 回傳格式錯誤');
        
        data.forEach(d => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${d.交易日期}</td>
            <td>${d.市場名稱}</td>
            <td>${d.作物名稱}</td>
            <td>${d.上價}</td>
            <td>${d.中價}</td>
            <td>${d.下價}</td>
            <td>${d.平均價}</td>
            <td>${d.交易量}</td>
          `;
          tbody.appendChild(tr);
        });
        
        loading.style.display = 'none';
        table.style.display = 'table';
        
      } catch (e) {
        loading.textContent = '載入失敗: ' + e.message;
      }
    }
    
    loadData();
  </script>
</body>
</html>
