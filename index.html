<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台北果菜市場行情儀表板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes marquee {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
   .marquee-content {
      animation: marquee 40s linear infinite;
    }
   .marquee:hover.marquee-content {
      animation-play-state: paused;
    }
  </style>
</head>
<body class="bg-gray-50">
  <div class="max-w-7xl mx-auto p-4">

    <!-- Header -->
    <div class="mb-6">
      <h1 class="text-3xl font-bold text-gray-900">台北果菜市場行情</h1>
      <p class="text-gray-500 text-sm mt-1">資料來源：農業部農產品交易行情站</p>
    </div>

    <!-- 今日行情跑馬燈 -->
    <div class="bg-gradient-to-r from-emerald-600 to-green-600 rounded-xl shadow-lg mb-6 overflow-hidden">
      <div class="px-4 py-2 bg-black/10 text-white text-sm font-semibold">今日熱門品項行情</div>
      <div class="marquee py-3 overflow-hidden whitespace-nowrap">
        <div id="marquee" class="marquee-content inline-block text-white text-sm"></div>
      </div>
    </div>

    <!-- 今日統計卡片 -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="bg-white rounded-xl shadow p-5">
        <div class="text-gray-500 text-sm">今日總交易量</div>
        <div class="flex items-baseline gap-2 mt-2">
          <span id="todayVol" class="text-2xl font-bold text-gray-900">-</span>
          <span class="text-sm text-gray-500">公斤</span>
          <span id="volChange" class="text-sm font-semibold"></span>
        </div>
      </div>
      <div class="bg-white rounded-xl shadow p-5">
        <div class="text-gray-500 text-sm">今日平均價格</div>
        <div class="flex items-baseline gap-2 mt-2">
          <span id="todayAvg" class="text-2xl font-bold text-gray-900">-</span>
          <span class="text-sm text-gray-500">元/公斤</span>
          <span id="avgChange" class="text-sm font-semibold"></span>
        </div>
      </div>
      <div class="bg-white rounded-xl shadow p-5">
        <div class="text-gray-500 text-sm">上架品項數</div>
        <div class="flex items-baseline gap-2 mt-2">
          <span id="todayCount" class="text-2xl font-bold text-gray-900">-</span>
          <span class="text-sm text-gray-500">種</span>
        </div>
      </div>
    </div>

    <!-- 篩選器 -->
    <div class="bg-white rounded-xl shadow p-5 mb-6">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">日期區間</label>
          <select id="daysSelect" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
            <option value="1">今日</option>
            <option value="7" selected>近 7 天</option>
            <option value="30">近 30 天</option>
            <option value="60">近 60 天</option>
            <option value="90">近 90 天</option>
            <option value="180">近 180 天</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">市場</label>
          <select id="marketSelect" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
            <option value="">全部市場</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">作物名稱</label>
          <input id="cropSearch" type="text" placeholder="輸入關鍵字..." class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
        </div>
        <div class="flex items-end">
          <button onclick="loadData()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg px-4 py-2 text-sm font-semibold transition">
            重新載入
          </button>
        </div>
      </div>
    </div>

    <!-- 圖表預留區塊 -->
    <div id="chartSection" class="bg-white rounded-xl shadow p-5 mb-6 hidden">
      <h3 class="text-lg font-semibold text-gray-900 mb-4">價格走勢圖</h3>
      <canvas id="priceChart" height="80"></canvas>
    </div>

    <!-- 資料表格 -->
    <div class="bg-white rounded-xl shadow overflow-hidden">
      <div class="px-5 py-3 border-b border-gray-200 flex justify-between items-center">
        <h3 class="text-lg font-semibold text-gray-900">詳細行情</h3>
        <span id="rowCount" class="text-sm text-gray-500"></span>
      </div>
      <div class="overflow-auto max-h-[600px]">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-gray-600 sticky top-0">
            <tr>
              <th class="px-4 py-3 text-left font-medium">日期</th>
              <th class="px-4 py-3 text-left font-medium">市場</th>
              <th class="px-4 py-3 text-left font-medium">品項</th>
              <th class="px-4 py-3 text-right font-medium">上價</th>
              <th class="px-4 py-3 text-right font-medium">中價</th>
              <th class="px-4 py-3 text-right font-medium">下價</th>
              <th class="px-4 py-3 text-right font-medium">均價</th>
              <th class="px-4 py-3 text-right font-medium">漲跌</th>
              <th class="px-4 py-3 text-right font-medium">交易量</th>
            </tr>
          </thead>
          <tbody id="tbody" class="divide-y divide-gray-100"></tbody>
        </table>
      </div>
      <div id="loading" class="text-center py-10 text-gray-500">載入中...</div>
      <div id="pagination" class="px-5 py-3 border-t border-gray-200 flex justify-between items-center"></div>
    </div>

  </div>

  <script>
    let allData = [];
    let prevData = [];
    let filteredData = [];
    let currentPage = 1;
    const pageSize = 50;

    async function loadData() {
      const days = document.getElementById('daysSelect').value;
      const market = document.getElementById('marketSelect').value;
      const crop = document.getElementById('cropSearch').value.trim();

      document.getElementById('loading').style.display = 'block';
      document.getElementById('loading').textContent = '載入中...';
      document.getElementById('tbody').innerHTML = '';

      try {
        const [curRes, prevRes] = await Promise.all([
          fetch(`/api/fruit?days=${days}`),
          fetch(`/api/fruit?days=${+days + 1}`)
        ]);

        const curData = await curRes.json();
        const prevDataAll = await prevRes.json();

        allData = Array.isArray(curData)? curData : [];
        const prev = Array.isArray(prevDataAll)? prevDataAll : [];

        const dates = [...new Set(prev.map(d => d.交易日期))].sort().reverse();
        prevData = dates.length > 1? prev.filter(d => d.交易日期 === dates[1]) : [];

        currentPage = 1;
        renderAll(market, crop);

      } catch (e) {
        document.getElementById('loading').textContent = '載入失敗: ' + e.message;
        console.error(e);
      }
    }

    function renderAll(marketFilter, cropFilter) {
      filteredData = allData;
      if (marketFilter) filteredData = filteredData.filter(d => d.市場名稱 === marketFilter);
      if (cropFilter) filteredData = filteredData.filter(d => d.作物名稱.includes(cropFilter));

      renderMarquee();
      renderStats();
      renderTable();
      updateMarketOptions();

      document.getElementById('loading').style.display = 'none';
    }

    function renderMarquee() {
      const dates = [...new Set(allData.map(d => d.交易日期))].sort().reverse();
      const todayData = allData.filter(d => d.交易日期 === dates[0]);

      const el = document.getElementById('marquee');
      if (!todayData.length) {
        el.innerHTML = '今日休市或尚無資料';
        return;
      }

      const items = todayData.slice(0, 30).map(d => {
        const prev = prevData.find(p => p.市場名稱 === d.市場名稱 && p.作物名稱 === d.作物名稱);
        let change = 0;
        if (prev && prev.平均價 > 0) {
          change = ((d.平均價 - prev.平均價) / prev.平均價 * 100).toFixed(1);
        }
        const color = change > 0? 'text-red-300' : change < 0? 'text-green-300' : 'text-gray-300';
        const arrow = change > 0? '▲' : change < 0? '▼' : '—';
        return `<span class="mx-6">${d.作物名稱} ${d.平均價}元 <span class="${color}">${arrow}${Math.abs(change)}%</span></span>`;
      }).join('');

      el.innerHTML = items + items;
    }

    function renderStats() {
      const dates = [...new Set(allData.map(d => d.交易日期))].sort().reverse();
      const today = allData.filter(d => d.交易日期 === dates[0]);

      if (!today.length) {
        ['todayVol', 'todayAvg', 'todayCount'].forEach(id => document.getElementById(id).textContent = '-');
        ['volChange', 'avgChange'].forEach(id => document.getElementById(id).textContent = '');
        return;
      }

      const todayVol = today.reduce((sum, d) => sum + d.交易量, 0);
      const prevVol = prevData.reduce((sum, d) => sum + d.交易量, 0);
      const volChange = prevVol? ((todayVol - prevVol) / prevVol * 100).toFixed(1) : 0;

      const todayAvg = (today.reduce((sum, d) => sum + d.平均價, 0) / today.length).toFixed(1);
      const prevAvg = prevData.length? (prevData.reduce((sum, d) => sum + d.平均價, 0) / prevData.length).toFixed(1) : 0;
      const avgChange = prevAvg? ((todayAvg - prevAvg) / prevAvg * 100).toFixed(1) : 0;

      document.getElementById('todayVol').textContent = todayVol.toLocaleString();
      document.getElementById('todayAvg').textContent = todayAvg;
      document.getElementById('todayCount').textContent = today.length;

      setChangeEl('volChange', volChange);
      setChangeEl('avgChange', avgChange);
    }

    function setChangeEl(id, change) {
      const el = document.getElementById(id);
      const num = parseFloat(change);
      if (num > 0) {
        el.className = 'text-sm font-semibold text-red-500';
        el.textContent = `▲ ${num}%`;
      } else if (num < 0) {
        el.className = 'text-sm font-semibold text-green-600';
        el.textContent = `▼ ${Math.abs(num)}%`;
      } else {
        el.className = 'text-sm font-semibold text-gray-400';
        el.textContent = '— 0%';
      }
    }

    function renderTable() {
      const tbody = document.getElementById('tbody');
      const totalPages = Math.ceil(filteredData.length / pageSize) || 1;
      const start = (currentPage - 1) * pageSize;
      const end = start + pageSize;
      const pageData = filteredData.slice(start, end);

      document.getElementById('rowCount').textContent = `共 ${filteredData.length} 筆`;

      tbody.innerHTML = pageData.map(d => {
        const prev = prevData.find(p => p.市場名稱 === d.市場名稱 && p.作物名稱 === d.作物名稱);
        let changeHtml = '<span class="text-gray-400">—</span>';
        if (prev && prev.平均價 > 0) {
          const change = ((d.平均價 - prev.平均價) / prev.平均價 * 100).toFixed(1);
          if (change > 0) changeHtml = `<span class="text-red-500 font-semibold">▲ ${change}%</span>`;
          else if (change < 0) changeHtml = `<span class="text-green-600 font-semibold">▼ ${Math.abs(change)}%</span>`;
        }
        return `
          <tr class="hover:bg-gray-50">
            <td class="px-4 py-3 text-gray-900">${d.交易日期}</td>
            <td class="px-4 py-3 text-gray-600">${d.市場名稱}</td>
            <td class="px-4 py-3 font-medium text-gray-900">${d.作物名稱}</td>
            <td class="px-4 py-3 text-right text-gray-900">${d.上價}</td>
            <td class="px-4 py-3 text-right text-gray-900">${d.中價}</td>
            <td class="px-4 py-3 text-right text-gray-900">${d.下價}</td>
            <td class="px-4 py-3 text-right font-semibold text-gray-900">${d.平均價}</td>
            <td class="px-4 py-3 text-right">${changeHtml}</td>
            <td class="px-4 py-3 text-right text-gray-600">${d.交易量.toLocaleString()}</td>
          </tr>
        `;
      }).join('');

      renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
      const paginationEl = document.getElementById('pagination');
      paginationEl.innerHTML = `
        <button onclick="changePage(-1)" ${currentPage === 1? 'disabled' : ''}
          class="px-3 py-1 text-sm border rounded-lg disabled:opacity-30 disabled:cursor-not-allowed hover:bg-gray-50">
          上一頁
        </button>
        <span class="text-sm text-gray-600">第 ${currentPage} / ${totalPages} 頁</span>
        <button onclick="changePage(1)" ${currentPage === totalPages? 'disabled' : ''}
          class="px-3 py-1 text-sm border rounded-lg disabled:opacity-30 disabled:cursor-not-allowed hover:bg-gray-50">
          下一頁
        </button>
      `;
    }

    function changePage(dir) {
      const totalPages = Math.ceil(filteredData.length / pageSize);
      currentPage = Math.max(1, Math.min(totalPages, currentPage + dir));
      renderTable();
    }

    function updateMarketOptions() {
      const markets = [...new Set(allData.map(d => d.市場名稱))].sort();
      const select = document.getElementById('marketSelect');
      const cur = select.value;
      select.innerHTML = '<option value="">全部市場</option>' +
        markets.map(m => `<option value="${m}" ${m === cur? 'selected' : ''}>${m}</option>`).join('');
    }

    // 初始載入
    loadData();
    document.getElementById('daysSelect').addEventListener('change', loadData);
    document.getElementById('marketSelect').addEventListener('change', () => {
      currentPage = 1;
      renderAll(
        document.getElementById('marketSelect').value,
        document.getElementById('cropSearch').value.trim()
      );
    });
    document.getElementById('cropSearch').addEventListener('input', () => {
      currentPage = 1;
      renderAll(
        document.getElementById('marketSelect').value,
        document.getElementById('cropSearch').value.trim()
      );
    });
  </script>
</body>
</html>
