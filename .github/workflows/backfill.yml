name: debug
on: { workflow_dispatch: {} }
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - run: |
          node -e "
          (async()=>{
            const date='115.05.29';
            const url=\`https://data.moa.gov.tw/api/v1/AgriProductsTransType/?Start_time=\${date}&End_time=\${date}&\$limit=5\`;
            const res=await fetch(url).then(r=>r.json());
            const data=res.Data||res||[];
            console.log('總筆數:', data.length);
            console.log('第一筆完整資料:', JSON.stringify(data[0],null,2));
            console.log('所有 MarketCode:', [...new Set(data.map(x=>x.MarketCode))].slice(0,20));
            console.log('所有 MarketName:', [...new Set(data.map(x=>x.MarketName))].slice(0,20));
            console.log('三重相關:', data.filter(x=>JSON.stringify(x).includes('三重')).length);
          })()
          "
