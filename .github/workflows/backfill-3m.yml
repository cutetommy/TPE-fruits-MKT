name: Backfill SanChong Data

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Days to backfill'
        required: true
        default: '90'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Run backfill script
        run: |
          node <<'EOF'
          const KV_URL = process.env.KV_REST_API_URL;
          const KV_TOKEN = process.env.KV_REST_API_TOKEN;
          
          const toMinguo = (date) => {
            const y = date.getFullYear() - 1911;
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}.${m}.${d}`;
          };
          
          async function fetchOneDay(dateStr) {
            const base = 'https://data.moa.gov.tw/api/v1/AgriProductsTransType';
            const url = `${base}/?Start_time=${dateStr}&End_time=${dateStr}&TransType=N05&$limit=10000`;
            try {
              const res = await fetch(url);
              const data = await res.json();
              // 防呆：如果不是陣列就當沒資料
              if (!Array.isArray(data)) {
                console.log(`${dateStr}: API回傳非陣列 ${JSON.stringify(data).slice(0,50)}`);
                return [];
              }
              return data;
            } catch (e) {
              console.error(`${dateStr}: fetch error`, e.message);
              return [];
            }
          }
          
          async function setKV(key, value) {
            await fetch(`${KV_URL}/set/${key}`, {
              method: 'POST',
              headers: { 
                Authorization: `Bearer ${KV_TOKEN}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify(value)
            });
            await fetch(`${KV_URL}/expire/${key}/17280000`, {
              method: 'POST',
              headers: { Authorization: `Bearer ${KV_TOKEN}` }
            });
          }
          
          async function main() {
            const days = parseInt('${{ github.event.inputs.days }}') || 90;
            let totalCount = 0;
            
            for (let i = 0; i <= days; i++) {
              const date = new Date();
              date.setDate(date.getDate() - i);
              const queryDate = toMinguo(date);
              
              if (date.getDay() === 1) {
                const empty = { 休市: true, 市場名稱: '三重果菜市場', 交易日期: queryDate, data: [] };
                await setKV(`fruit:sc:${queryDate}`, empty);
                console.log(`${queryDate}: 休市`);
                continue;
              }
              
              const all = await fetchOneDay(queryDate);
              const sanChong = all.filter(d => d.MarketName && d.MarketName.includes('三重'));
              totalCount += sanChong.length;
              
              const seen = new Set();
              const data = sanChong.filter(d => {
                const key = d.CropName.trim();
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
              }).map(d => ({
                作物名稱: d.CropName.trim(),
                上價: +d.Upper_Price || 0,
                中價: +d.Middle_Price || 0,
                下價: +d.Lower_Price || 0,
                平均價: +d.Avg_Price || 0,
                交易量: +d.Trans_Quantity || 0
              }));
              
              const result = { 
                休市: data.length === 0, 
                市場名稱: '三重果菜市場',
                交易日期: queryDate, 
                data 
              };
              
              await setKV(`fruit:sc:${queryDate}`, result);
              console.log(`${queryDate}: ${data.length}`);
              await new Promise(r => setTimeout(r, 500));
            }
            
            console.log('Total SanChong rows:', totalCount);
            console.log('Done');
          }
          
          main().catch(e => {
            console.error(e);
            process.exit(1);
          });
          EOF
        env:
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
